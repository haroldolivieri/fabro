name: TypeScript

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "lib/crates/fabro-spa/**"
      - "lib/packages/**"
      - "package.json"
      - "bun.lock"
      - ".gitattributes"
      - "scripts/**"
      - ".github/workflows/typescript.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "lib/crates/fabro-spa/**"
      - "lib/packages/**"
      - "package.json"
      - "bun.lock"
      - ".gitattributes"
      - "scripts/**"
      - ".github/workflows/typescript.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install
      - run: cd apps/fabro-web && bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install
      - run: cd apps/fabro-web && bun test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install
      - run: scripts/refresh-fabro-spa.sh
      - run: git diff --exit-code -- lib/crates/fabro-spa/assets
      - run: scripts/check-fabro-spa-budgets.sh
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - run: cargo build -p fabro-cli --release
      - run: wc -c < target/release/fabro
