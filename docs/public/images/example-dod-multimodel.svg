  <polygon fill="none" stroke="#357f9e" points="1015,30 1045,30 1045,66 1015,66"/>
  <polyline fill="none" stroke="#357f9e" points="1025,30 1015,40"/>
  <polyline fill="none" stroke="#357f9e" points="1015,56 1025,66"/>
  <polyline fill="none" stroke="#357f9e" points="1035,66 1045,56"/>
  <polyline fill="none" stroke="#357f9e" points="1045,40 1035,30"/>
  <text xml:space="preserve" text-anchor="middle" x="1030" y="52" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Exit</text>

