  <polygon fill="none" stroke="#357f9e" points="710,30 778,30 770,66 702,66"/>
  <text xml:space="preserve" text-anchor="middle" x="740" y="52" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Build</text>

