<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1060" height="170" viewBox="0 0 1060 170" xmlns="http://www.w3.org/2000/svg">
<style>
  @media (prefers-color-scheme: dark) {
    [fill="#1a1a1a"] { fill: #e5e5e5; }
    [fill="#666666"] { fill: #aaaaaa; }
    [stroke="#666666"] { stroke: #aaaaaa; }
    [stroke="#999999"] { stroke: #777777; }
  }
</style>
<g>
  <!-- START (Mdiamond) at (40, 48) -->
  <polygon fill="none" stroke="#357f9e" points="40,30 10,48 40,66 70,48"/>
  <polyline fill="none" stroke="#357f9e" points="20,42 20,54"/>
  <polyline fill="none" stroke="#357f9e" points="30,60 50,60"/>
  <polyline fill="none" stroke="#357f9e" points="60,54 60,42"/>
  <polyline fill="none" stroke="#357f9e" points="50,36 30,36"/>
  <text xml:space="preserve" text-anchor="middle" x="40" y="52" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Start</text>

  <!-- DUAL AUDIT (ellipse) at (155, 48) -->
  <ellipse fill="none" stroke="#357f9e" cx="155" cy="48" rx="42" ry="18"/>
  <text xml:space="preserve" text-anchor="middle" x="155" y="52" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Dual Audit</text>
  <text xml:space="preserve" text-anchor="middle" x="155" y="80" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#666666">Opus + GPT</text>

  <!-- CRITIQUE (ellipse) at (280, 48) -->
  <ellipse fill="none" stroke="#357f9e" cx="280" cy="48" rx="34" ry="18"/>
  <text xml:space="preserve" text-anchor="middle" x="280" y="52" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Critique</text>

  <!-- CONSENSUS (ellipse) at (395, 48) -->
  <ellipse fill="none" stroke="#357f9e" cx="395" cy="48" rx="40" ry="18"/>
  <text xml:space="preserve" text-anchor="middle" x="395" y="52" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Consensus</text>

  <!-- TRIAGE (ellipse) at (510, 48) -->
  <ellipse fill="none" stroke="#357f9e" cx="510" cy="48" rx="28" ry="18"/>
  <text xml:space="preserve" text-anchor="middle" x="510" y="52" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Triage</text>
  <text xml:space="preserve" text-anchor="middle" x="510" y="80" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#666666">Opus + GPT</text>

  <!-- FIX CYCLE (ellipse) at (620, 48) -->
  <ellipse fill="none" stroke="#357f9e" cx="620" cy="48" rx="36" ry="18"/>
  <text xml:space="preserve" text-anchor="middle" x="620" y="52" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Fix Cycle</text>
  <text xml:space="preserve" text-anchor="middle" x="620" y="80" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#666666">Codex ↔ Opus</text>

