  <!-- start → dual_audit -->
  <path fill="none" stroke="#666666" d="M70,48 L103,48"/>
  <polygon fill="#666666" stroke="#666666" points="103,44.5 113,48 103,51.5"/>

  <!-- dual_audit → critique -->
  <path fill="none" stroke="#666666" d="M197,48 L236,48"/>
  <polygon fill="#666666" stroke="#666666" points="236,44.5 246,48 236,51.5"/>

  <!-- critique → consensus -->
  <path fill="none" stroke="#666666" d="M314,48 L345,48"/>
  <polygon fill="#666666" stroke="#666666" points="345,44.5 355,48 345,51.5"/>

  <!-- consensus → triage -->
  <path fill="none" stroke="#666666" d="M435,48 L472,48"/>
  <polygon fill="#666666" stroke="#666666" points="472,44.5 482,48 472,51.5"/>

  <!-- triage → fix_cycle -->
  <path fill="none" stroke="#666666" d="M538,48 L574,48"/>
  <polygon fill="#666666" stroke="#666666" points="574,44.5 584,48 574,51.5"/>
  <text xml:space="preserve" text-anchor="middle" x="561" y="43" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#666666">Fix</text>

