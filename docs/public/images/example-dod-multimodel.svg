  <ellipse fill="none" stroke="#357f9e" cx="845" cy="48" rx="28" ry="18"/>
  <text xml:space="preserve" text-anchor="middle" x="845" y="52" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Verify</text>
  <text xml:space="preserve" text-anchor="middle" x="845" y="80" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#666666">Opus + GPT</text>

