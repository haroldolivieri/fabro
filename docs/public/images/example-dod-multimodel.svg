  <polygon fill="none" stroke="#357f9e" points="912,48 922,30 958,30 968,48 958,66 922,66"/>
  <text xml:space="preserve" text-anchor="middle" x="940" y="52" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Review</text>

