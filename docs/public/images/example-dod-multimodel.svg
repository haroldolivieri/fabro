  <path fill="none" stroke="#666666" d="M774,48 L807,48"/>
  <polygon fill="#666666" stroke="#666666" points="807,44.5 817,48 807,51.5"/>
  <text xml:space="preserve" text-anchor="middle" x="796" y="43" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#666666">OK</text>

  <!-- verify → review -->
  <path fill="none" stroke="#666666" d="M873,48 L902,48"/>
  <polygon fill="#666666" stroke="#666666" points="902,44.5 912,48 902,51.5"/>

  <!-- review → exit [Accept] -->
  <path fill="none" stroke="#666666" d="M968,48 L1005,48"/>
  <polygon fill="#666666" stroke="#666666" points="1005,44.5 1015,48 1005,51.5"/>
  <text xml:space="preserve" text-anchor="middle" x="991" y="43" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#666666">Accept</text>

  <!-- === LOOPS === -->

  <!-- fix_cycle self-loop (above) -->
  <path fill="none" stroke="#666666" d="M612,32 C606,10 634,10 628,32"/>
  <polygon fill="#666666" stroke="#666666" points="624,26 628,36 632,26"/>

  <!-- build → build_fix [Fail] -->
  <path fill="none" stroke="#666666" d="M748,66 L748,104"/>
  <polygon fill="#666666" stroke="#666666" points="744.5,104 748,114 751.5,104"/>
  <text xml:space="preserve" text-anchor="middle" x="762" y="91" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#666666">Fail</text>

  <!-- build_fix → build (curved left) -->
  <path fill="none" stroke="#666666" d="M714,120 C688,105 688,72 710,58"/>
  <polygon fill="#666666" stroke="#666666" points="706,62 710,52 714,62"/>

  <!-- verify → triage [More work] (backward arc below) -->
  <path fill="none" stroke="#666666" d="M840,66 C840,162 515,162 515,66"/>
  <polygon fill="#666666" stroke="#666666" points="511,72 515,62 519,72"/>
  <text xml:space="preserve" text-anchor="middle" x="678" y="162" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#666666">More work</text>
