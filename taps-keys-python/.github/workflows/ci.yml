name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Contract runner L1–L3 + unit tests
    runs-on: ubuntu-latest-xlarge
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        # Uses HTTPS — works for public repos. For private repos, replace with:
        # pip install "git+https://x-access-token:${{ secrets.GH_PAT }}@github.com/Skyscanner/..."
        run: |
          pip install pytest build
          pip install "git+https://github.com/Skyscanner/taps-keys-fixtures.git"
          pip install "git+https://github.com/Skyscanner/taps-keys-schemas.git"
          pip install -e .

      - name: Contract runner L1–L3 (2130 encoding cases, 852 signature checks)
        run: python3 -m taps_keys_fixtures.runner --module taps_keys

      - name: Unit tests
        run: python3 -m pytest tests/ -v

  validate-java-parity:
    name: L5 Java/Python direct parity + L6 Fuzz + e2e smoke
    runs-on: ubuntu-latest-xlarge
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: adopt
          java-version: "11"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install "git+https://github.com/Skyscanner/taps-keys-fixtures.git"
          pip install "git+https://github.com/Skyscanner/taps-keys-schemas.git"
          pip install -e .

      - name: Download fixture validator JAR from fabro
        run: |
          curl -fsSL -o /tmp/taps-keys-fixture-gen.jar \
            "https://github.com/haroldolivieri/fabro/raw/main/tools/taps-keys-fixture-gen/taps-keys-fixture-gen.jar"

      - name: Extract golden fixtures from package
        run: |
          mkdir -p /tmp/fixtures
          python3 -c "
          from importlib.resources import files; import pathlib
          src = files('taps_keys_fixtures.fixtures')
          dst = pathlib.Path('/tmp/fixtures')
          for f in ['golden_encodings.json', 'golden_signatures.json']:
              (dst / f).write_text((src / f).read_text())
          print('Extracted fixtures')
          "

      - name: L5 — Java/Python direct parity (2130 cases)
        run: |
          java -cp /tmp/taps-keys-fixture-gen.jar net.skyscanner.tools.EncodeMain \
            /tmp/fixtures/golden_encodings.json /tmp/java_outputs.json
          python3 - <<'EOF'
          import json, sys
          from datetime import datetime
          from taps_keys.keys import OneWay, Return
          from taps_keys.schema import KeyBuilder

          fixtures = json.load(open('/tmp/fixtures/golden_encodings.json'))
          java_out = {(e['schema'], e['input_set']): e for e in json.load(open('/tmp/java_outputs.json'))}

          def get_schema(prefix, name):
              return getattr(OneWay if prefix == 'oneway' else Return, name)

          passed = failed = 0
          for entry in fixtures:
              schema = get_schema(entry['prefix'], entry['schema'])
              outbound = datetime.strptime(entry['outbound_date'], '%Y-%m-%d').date()
              inbound = datetime.strptime(entry['inbound_date'], '%Y-%m-%d').date() if entry['inbound_date'] else None
              orig_a = entry.get('origin_airport', entry['origin'])
              orig_c = entry.get('origin_city', orig_a)
              orig_co = entry.get('origin_country', orig_a)
              dest_a = entry.get('destination_airport', entry['destination'])
              dest_c = entry.get('destination_city', dest_a)
              dest_co = entry.get('destination_country', dest_a)
              b = (schema.key_builder()
                  .marketing_carrier(entry['carrier'])
                  .origin_airport(orig_a).origin_city(orig_c).origin_country(orig_co)
                  .destination_airport(dest_a).destination_city(dest_c).destination_country(dest_co)
                  .outbound_departure_year_month(outbound).outbound_departure_day(outbound))
              if inbound:
                  b = b.inbound_departure_year_month(inbound).inbound_departure_day(inbound)
              is_d = entry['is_direct']
              b = b.is_direct(KeyBuilder.any_direct() if is_d == 'wildcard' else is_d)
              key = b.build()
              jk = (entry['schema'], entry['input_set'])
              if jk not in java_out:
                  print(f"FAIL [{entry['schema']}/{entry['input_set']}]: missing from Java output")
                  failed += 1
                  continue
              jv = java_out[jk]
              if key.encode() == jv['encoded_key'] and key.to_string() == jv['to_string'] and key.to_string('|') == jv['to_string_pipe']:
                  passed += 1
              else:
                  print(f"FAIL [{entry['schema']}/{entry['input_set']}]: encode={key.encode()!r} Java={jv['encoded_key']!r}")
                  failed += 1
          print(f'L5: {passed}/{passed+failed} Java/Python parity checks passed')
          if failed > 0:
              sys.exit(1)
          EOF

      - name: L6 — Fuzz parity (14200 random inputs)
        run: |
          java -cp /tmp/taps-keys-fixture-gen.jar net.skyscanner.tools.FuzzEncoder \
            --seed 42 --count 100 --output /tmp/fuzz_java_outputs.json
          python3 - <<'FUZZ'
          import json, sys
          from datetime import datetime
          from taps_keys.keys import OneWay, Return

          fuzz = json.load(open('/tmp/fuzz_java_outputs.json'))

          def get_schema(prefix, name):
              return getattr(OneWay if prefix == 'oneway' else Return, name)

          passed = failed = 0
          for entry in fuzz:
              try:
                  schema = get_schema(entry['prefix'], entry['schema'])
                  outbound = datetime.strptime(entry['outbound_date'], '%Y-%m-%d').date()
                  inbound = datetime.strptime(entry['inbound_date'], '%Y-%m-%d').date() if entry['inbound_date'] else None
                  b = (schema.key_builder()
                      .marketing_carrier(entry['carrier'])
                      .origin_airport(entry['origin']).origin_city(entry['origin']).origin_country(entry['origin'])
                      .destination_airport(entry['destination']).destination_city(entry['destination']).destination_country(entry['destination'])
                      .outbound_departure_year_month(outbound).outbound_departure_day(outbound))
                  if inbound:
                      b = b.inbound_departure_year_month(inbound).inbound_departure_day(inbound)
                  b = b.is_direct(entry['is_direct'])
                  key = b.build()
                  if key.encode() == entry['encoded_key'] and key.to_string() == entry['to_string'] and key.to_string('|') == entry['to_string_pipe']:
                      passed += 1
                  else:
                      print(f'FAIL [{entry["schema"]}/fuzz-{entry["fuzz_id"]}]: encode={key.encode()!r} Java={entry["encoded_key"]!r}')
                      failed += 1
              except Exception as e:
                  print(f'FAIL [{entry["schema"]}/fuzz-{entry["fuzz_id"]}]: {type(e).__name__}: {e}')
                  failed += 1
          print(f'L6: {passed}/{passed+failed} fuzz parity checks passed')
          if failed > 0:
              sys.exit(1)
          FUZZ

      - name: e2e smoke — known-good key assertion
        run: |
          python3 - <<'SMOKE'
          from taps_keys.keys import OneWay
          from datetime import date
          key = (OneWay.AIRPORT_AIRPORT_DAY_OW.key_builder()
              .origin_airport(13554).destination_airport(13555)
              .outbound_departure_year_month(date(2018, 7, 8))
              .outbound_departure_day(date(2018, 7, 8))
              .is_direct(True).build().encode())
          assert key == "0d7i0d7ji681", f"e2e FAIL: got {key!r}"
          print(f"e2e OK: {key}")
          SMOKE
